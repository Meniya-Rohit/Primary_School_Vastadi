<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Video Gallery</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

body{
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: cornflowerblue;
}

.container{
    width: 1100px;
    height: 480px;
    display: flex;   
    background: rgb(238, 236, 236);
    /* video vadharva na thay to height and width nicheni levi */
    /* width: 1200px;
    height: 800px; */
}

.container .videos{
    width: 20%;
    padding: 10px 0 10px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.container .videos video{
    width: 95%;
    height: 100px;
    margin: 10px;
    object-fit: cover;
    cursor: pointer;
    transition: 0.2s;
}

.container .videos video:nth-child(1){
    margin-top: 0;
}

.container .videos video:hover,
.container .videos .active{
    transform: scale(1.06);
    border: 3px solid blue;
}

.container .main-video{
    width: 80%;
    padding: 10px;
}

.container .main-video video{
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: 3px solid blue;
}
    </style>
</head>
<body>

    <div class="container">
        <div class="videos">
            <video class="active" src="video/Aankho_mein_aakhen_Teri_bahon_mein_bahe_Teri_song_stetus_😘___love_stetus_video___(480p).mp4" muted></video>
            <video src="video/Agar_tum_sath_ho_teri_nazro_me_hai_tere_sapne_sad_songs_statuse__lofi__lyrice_Arijit_shingh(480p).mp4" muted></video>
            <video src="video/Dekh_Lena_💕_Arjit_Singh_💫_Lofi_Mix_Status__Black_Screen_Lyrics_Status___Whatsapp_Status(1080p).mp4" muted></video>
            <video src="video/Tera_Fitoor_♥️_song_for_Status___slowed-reverb___M.S-KHAN.9(720p).mp4" muted></video>
            
            
        </div>
        <div class="main-video">
            <video src="video/Mangi_Mangi_Dua_mangi_hai_🥺🤍-_Tera_Hoke_Rahoon____lofi_status_-_Arijit_singh_✨💙(480p).mp4" muted controls autoplay></video>
        </div>
    </div>

    <!-- jquery cdn link -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>

        $(document).ready(function(){

            $('.videos video').click(function(){

                $(this).addClass('active').siblings().removeClass('active');

                var src = $(this).attr('src');
                $('.main-video video').attr('src',src);
            });
        });

    </script>

</body>
</html>
